<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Energy Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="diseny.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <h1>⚡ Energy Dashboard</h1>

    <p><strong>Loaded file:</strong></p>
    <p class="file">dataclean.json</p>

    <button onclick="loadData()">Run Calculation</button>
    <button onclick="toggleInstructions()">JSON Instructions</button>

    <div id="instructions" class="hidden">
      <pre>
Your JSON is already valid ✔
      </pre>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    <div class="card"><h2>Electric (Year)</h2><p id="electricYear">-</p></div>
    <div class="card"><h2>Electric (Period)</h2><p id="electricPeriod">-</p></div>
    <div class="card"><h2>Water (Year)</h2><p id="waterYear">-</p></div>
    <div class="card"><h2>Water (Period)</h2><p id="waterPeriod">-</p></div>
    <div class="card"><h2>Office Supplies</h2><p id="officeYear">-</p></div>
    <div class="card"><h2>Cleaning</h2><p id="cleaningYear">-</p></div>

    <div class="card chart-card">
      <h2>Consumption Overview</h2>
      <canvas id="energyChart"></canvas>
    </div>

    <div class="card chart-card">
      <h2>Expenses Distribution</h2>
      <canvas id="expenseChart"></canvas>
    </div>

  </div>
</div>

<script>
let energyChart, expenseChart;

async function loadData() {
  const res = await fetch("dataclean.json");
  const data = await res.json();
  const docs = data.documents;

  const totalEnergy = docs
    .filter(d => d.document_type === "energy_report")
    .reduce((sum, e) => sum + (e.total_consumption_kwh || 0), 0);

  const totalWater = docs
    .filter(d => d.document_type === "water_consumption")
    .reduce((sum, w) => sum + (w.average_consumption_liters || 0), 0);

  const officeTotal = docs
    .filter(d => d.category === "office_supplies")
    .reduce((sum, o) => sum + (o.total_amount || 0), 0);

  const cleaningTotal = docs
    .filter(d => d.category === "cleaning")
    .reduce((sum, c) => sum + (c.total_amount || 0), 0);

  document.getElementById("electricYear").textContent = totalEnergy.toFixed(2) + " kWh";
  document.getElementById("electricPeriod").textContent = (totalEnergy / 2).toFixed(2) + " kWh";

  document.getElementById("waterYear").textContent = totalWater + " L";
  document.getElementById("waterPeriod").textContent = (totalWater / 2).toFixed(0) + " L";

  document.getElementById("officeYear").textContent = "€" + officeTotal.toFixed(2);
  document.getElementById("cleaningYear").textContent = "€" + cleaningTotal.toFixed(2);

  renderCharts(totalEnergy, totalWater, officeTotal, cleaningTotal);
}

function renderCharts(energy, water, office, cleaning) {

  if (energyChart) energyChart.destroy();
  if (expenseChart) expenseChart.destroy();

  energyChart = new Chart(document.getElementById("energyChart"), {
    type: "bar",
    data: {
      labels: ["Energy", "Water"],
      datasets: [{
        data: [energy, water],
        backgroundColor: ["#22c55e", "#38bdf8"],
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#94a3b8" } },
        y: { ticks: { color: "#94a3b8" } }
      }
    }
  });

  expenseChart = new Chart(document.getElementById("expenseChart"), {
    type: "doughnut",
    data: {
      labels: ["Office", "Cleaning"],
      datasets: [{
        data: [office, cleaning],
        backgroundColor: ["#facc15", "#f472b6"],
        borderWidth: 0
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#cbd5f5" }
        }
      }
    }
  });
}

function toggleInstructions() {
  document.getElementById("instructions").classList.toggle("hidden");
}
</script>

</body>
</html>
