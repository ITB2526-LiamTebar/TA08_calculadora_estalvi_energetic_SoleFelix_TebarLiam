<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Energy Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="diseny.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h1>⚡ Energy Dashboard</h1>
    <p class="subtitle">Monitor consumption and efficiency</p>

    <p><strong>Loaded file:</strong></p>
    <p class="file">dataclean.json</p>

    <button onclick="loadData()">Run Analysis</button>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card">
      <h2>⚡ Electric (Year)</h2>
      <p id="electricYear">-</p>
      <small id="recEnergy"></small>
    </div>

    <div class="card">
      <h2>⚡ Electric (Period)</h2>
      <p id="electricPeriod">-</p>
      <small id="recEnergyPeriod"></small>
    </div>

    <div class="card">
      <h2>💧 Water (Year)</h2>
      <p id="waterYear">-</p>
      <small id="recWater"></small>
    </div>

    <div class="card">
      <h2>💧 Water (Period)</h2>
      <p id="waterPeriod">-</p>
      <small id="recWaterPeriod"></small>
    </div>

    <div class="card">
      <h2>📦 Office Supplies</h2>
      <p id="officeYear">-</p>
      <small id="recOffice"></small>
    </div>

    <div class="card">
      <h2>🧼 Cleaning</h2>
      <p id="cleaningYear">-</p>
      <small id="recCleaning"></small>
    </div>

    <div class="card chart-card">
      <h2>📊 Consumption Overview</h2>
      <canvas id="energyChart"></canvas>
    </div>

    <div class="card chart-card">
      <h2>📊 Expenses Distribution</h2>
      <canvas id="expenseChart"></canvas>
    </div>

  </div>
</div>

<script>
let energyChart, expenseChart;

async function loadData() {
  const res = await fetch("dataclean.json");
  const data = await res.json();
  const docs = data.documents;

  const totalEnergy = docs.filter(d => d.document_type === "energy_report")
    .reduce((sum, e) => sum + (e.total_consumption_kwh || 0), 0);

  const totalWater = docs.filter(d => d.document_type === "water_consumption")
    .reduce((sum, w) => sum + (w.average_consumption_liters || 0), 0);

  const officeTotal = docs.filter(d => d.category === "office_supplies")
    .reduce((sum, o) => sum + (o.total_amount || 0), 0);

  const cleaningTotal = docs.filter(d => d.category === "cleaning")
    .reduce((sum, c) => sum + (c.total_amount || 0), 0);

  // DISPLAY
  electricYear.textContent = totalEnergy.toFixed(2) + " kWh";
  electricPeriod.textContent = (totalEnergy / 2).toFixed(2) + " kWh";

  waterYear.textContent = totalWater + " L";
  waterPeriod.textContent = (totalWater / 2).toFixed(0) + " L";

  officeYear.textContent = "€" + officeTotal.toFixed(2);
  cleaningYear.textContent = "€" + cleaningTotal.toFixed(2);

  // RECOMMENDATIONS
  recEnergy.textContent = totalEnergy > 500
    ? "⚠️ Reduce energy usage"
    : "✅ Efficient energy use";

  recEnergyPeriod.textContent = (totalEnergy/2) > 250
    ? "⚠️ High short-term usage"
    : "✅ Stable consumption";

  recWater.textContent = totalWater > 1000
    ? "⚠️ Reduce water usage"
    : "✅ Efficient usage";

  recWaterPeriod.textContent = (totalWater/2) > 500
    ? "⚠️ Monitor short-term usage"
    : "✅ Controlled usage";

  recOffice.textContent = officeTotal > 1000
    ? "⚠️ Reduce office expenses"
    : "✅ Controlled spending";

  recCleaning.textContent = cleaningTotal > 1000
    ? "⚠️ Optimize cleaning costs"
    : "✅ Efficient costs";

  renderCharts(totalEnergy, totalWater, officeTotal, cleaningTotal);
}

function renderCharts(energy, water, office, cleaning) {

  if (energyChart) energyChart.destroy();
  if (expenseChart) expenseChart.destroy();

  const energyCanvas = document.getElementById("energyChart");
  const expenseCanvas = document.getElementById("expenseChart");

  energyChart = new Chart(energyCanvas, {
    type: "bar",
    data: {
      labels: ["Energy", "Water"],
      datasets: [{
        data: [energy, water],
        backgroundColor: ["#22c55e", "#38bdf8"]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        tooltip: { enabled: true }
      },
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const i = elements[0].index;
          alert(["Energy", "Water"][i]);
        }
      }
    }
  });

  expenseChart = new Chart(expenseCanvas, {
    type: "doughnut",
    data: {
      labels: ["Office", "Cleaning"],
      datasets: [{
        data: [office, cleaning],
        backgroundColor: ["#facc15", "#f472b6"]
      }]
    },
    options: {
      responsive: true,
      cutout: "60%"
    }
  });
}
</script>

</body>
</html>
